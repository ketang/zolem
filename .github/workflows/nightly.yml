name: Nightly

on:
  schedule:
    # 07:00 UTC daily, after most work has landed on main.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        # GoReleaser's `sboms:` block shells out to syft; it is not bundled.
        uses: anchore/sbom-action/download-syft@v0

      - name: Reset nightly release and tag
        # The nightly tag moves to the tip of main on every run. Delete the
        # previous GitHub release and its tag first so GoReleaser can publish a
        # fresh one without colliding with stale assets, then re-point the tag.
        # `v0.0.0-nightly` is valid semver with a prerelease segment, which is
        # what GoReleaser requires (a bare `nightly` is rejected) and what marks
        # the build as a prerelease so it never updates the `:latest` image.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v0.0.0-nightly --yes --cleanup-tag || true
          git tag -f v0.0.0-nightly
          git push -f origin v0.0.0-nightly

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v0.0.0-nightly
