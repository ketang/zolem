# Shatter project configuration for Zolem.
#
# This file contains per-function defaults. Repository-wide discovery and
# output settings live in shatter.config.json.

defaults:
  max_iterations: 100
  timeout: 60

go_runtime_values:
  # Shatter owns these scan-only values for the lifetime of the generated Go
  # frontend process. The compiled module depends on its Runner's wazero runtime,
  # so process-lifetime ownership keeps the runtime alive for all generated calls.
  "fixture.CompiledModule":
    expression: |
      func() CompiledModule {
        runner := NewRunner()
        mod, err := runner.CompileWASM(context.Background(), []byte{
          0x00, 0x61, 0x73, 0x6d,
          0x01, 0x00, 0x00, 0x00,
        })
        if err != nil {
          panic(err)
        }
        return mod
      }()
    imports:
      - context
  # These scan-only helpers keep the wazero runtime, compiled module, and
  # instantiated module alive for the lifetime of the generated frontend
  # process. They are intentionally package-local to internal/wasmgen because
  # Shatter pastes configured expressions into the target package.
  "api.FunctionDefinition":
    expression: newShatterFunctionDefinition()
  "api.Function":
    expression: newShatterFunction()

functions:
  "loader.go:loadOne":
    defaults:
      dir: "/home/ketan/project/zolem/testdata/fixtures/sample-anthropic"
  "loader.go:NewLoader":
    defaults:
      dir: "/home/ketan/project/zolem/testdata/fixtures"

  # NormalizeGeminiDiscovery: seed version and data so the discovery-doc parser
  # reaches the schema-extraction and JSON-normalization code paths instead of
  # bailing on empty JSON input. data is base64(testdata/specs/gemini-discovery-v1.json).
  "discovery.go:NormalizeGeminiDiscovery":
    defaults:
      version: "v1"
      data: ""

  # NormalizeOpenAPI: seed provider/version/data so the OpenAPI parser reaches
  # schema-extraction paths. data is base64 of a minimal valid OpenAPI 3.0 doc
  # with /v1/chat/completions POST (required for openai:v1 key lookup).
  "openapi.go:NormalizeOpenAPI":
    defaults:
      provider: "openai"
      version: "v1"
      data: ""

  # (OpenAPINormalizer).Normalize: seed source struct and raw bytes so Kind-based
  # dispatch reaches the openapi path. source is a YAML mapping (→ JSON object).
  "openapi.go:(OpenAPINormalizer).Normalize":
    defaults:
      source:
        Provider: "openai"
        Version: "v1"
        Kind: "openapi"
        Enabled: true
      raw: ""

  # (PassThroughNormalizer).Normalize: seed source.Kind=vendored_docs_snapshot so
  # the switch passes through raw bytes rather than returning "not implemented".
  "loader.go:(PassThroughNormalizer).Normalize":
    defaults:
      source:
        Kind: "vendored_docs_snapshot"
        Provider: "anthropic"
        Version: "v1"
        Enabled: true
      raw: "e30K"

  # HTTPChatCompletion / HTTPChatCompletionStream: seed upstream URL so shatter
  # exercises JSON marshal/HTTP dispatch paths instead of bailing on empty scheme.
  "http.go:HTTPChatCompletion":
    defaults:
      upstream: "http://localhost:11434"
      model: "gemma3:1b"
  "http.go:HTTPChatCompletionStream":
    defaults:
      upstream: "http://localhost:11434"
      model: "gemma3:1b"

  # (*Validator).LoadRaw: seed provider/version/data so the normalizer dispatch
  # reaches the openapi path. data = base64(minimal OpenAPI doc).
  "validator.go:(*Validator).LoadRaw":
    defaults:
      provider: "openai"
      version: "v1"
      data: ""

  # (*Validator).Validate: seed provider/version/body so the schema lookup finds
  # a known key rather than "no schema loaded". body = base64 of valid openai request.
  "validator.go:(*Validator).Validate":
    defaults:
      provider: "openai"
      version: "v1"
      body: "eyJtb2RlbCI6ICJncHQtNC1taW5pIiwgIm1lc3NhZ2VzIjogW3sicm9sZSI6ICJ1c2VyIiwgImNvbnRlbnQiOiAiaGVsbG8ifV19"

llm:
  enabled: true
  adapter: local
  local:
    command: ["ollama", "serve"]
    model: gemma3:1b
    port: 11434
    startup_timeout_seconds: 60
